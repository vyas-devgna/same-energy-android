name: Bug Report
description: Create a report to help us improve the Same.Energy Android Client
title: "bug: <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out this form as completely as possible.
  - type: checkboxes
    id: search
    attributes:
      label: Search for duplicates
      description: Check if there's already an open issue for this feature request.
      options:
        - label: I have searched the existing issues and found no duplicate.
          required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How do you trigger this bug? Please provide sequential steps.
      value: |
        1. Open the app
        2. Go to '...'
        3. Click on '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? (Include screenshots or screen recordings if applicable)
    validations:
      required: true
  - type: input
    id: app_version
    attributes:
      label: App Version
      description: Which version of the application are you using? e.g. 1.0.0
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Info
      description: Which device are you using? e.g. Samsung Galaxy S23, Google Pixel 7
    validations:
      required: true
  - type: input
    id: android_version
    attributes:
      label: Android Version
      description: Which version of Android is the device running? e.g. Android 13, API level 33
    validations:
      required: true
