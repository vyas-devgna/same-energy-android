name: Feature Request
description: Suggest an idea for this project
title: "feat: <short description>"
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love ideas! Please provide a clear and detailed description of the feature you want.
  - type: checkboxes
    id: search
    attributes:
      label: Search for duplicates
      description: Check if there's already an open issue for this feature request.
      options:
        - label: I have searched the existing issues and found no duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Please describe.
      placeholder: "It's always frustrating when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: A clear and concise description of what you want to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: A clear and concise description of any alternative solutions or workarounds you've considered.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context or screenshots about the feature request here.
