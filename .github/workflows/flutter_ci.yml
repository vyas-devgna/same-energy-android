name: "Flutter CI"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    name: Build, Analyze, and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Java Environments
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'
          cache: true

      - name: 📦 Get Dependencies
        run: flutter pub get

      - name: 🔍 Static Analysis
        run: flutter analyze

      - name: 🧪 Run Tests
        run: flutter test --coverage

      - name: 🛠️ Build Release APK (Verification only)
        run: flutter build apk --release
        # This step just verifies the app builds successfully in release mode
        # The actual release artifact is built by the release workflow
